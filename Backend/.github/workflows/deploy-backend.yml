name: Build and deploy backend

on:
  push:
    branches: [main]
    paths:
      - "Backend/**"
      - ".github/workflows/deploy-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "Backend/**"
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: omnicorepilotdev.azurecr.io
  ACR_NAME: omnicorepilotdev
  RESOURCE_GROUP: <AZURE_RESOURCE_GROUP>
  APP_NAME: gxp-backend
  IMAGE_NAME: gxp-backend

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Runs on every PR and every push. Cheap, fast, no Azure access needed.
  # ---------------------------------------------------------------------------
  verify:
    name: Typecheck and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        working-directory: Backend
        run: npm ci

      - name: Typecheck
        working-directory: Backend
        run: npm run typecheck

      - name: Lint
        working-directory: Backend
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Builds and pushes the image. Only on main, never on PRs.
  # ---------------------------------------------------------------------------
  build:
    name: Build and push image
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_NAME }}

      - uses: docker/setup-buildx-action@v3

      - name: Compute image reference
        id: meta
        run: echo "image=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

  # ---------------------------------------------------------------------------
  # Deploys. Gated on manual approval via the "production" environment.
  # Configure reviewers: Settings > Environments > production.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Container Apps
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update container app
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ needs.build.outputs.image }}

      - name: Report deployed revision
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ needs.build.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://$FQDN" >> $GITHUB_STEP_SUMMARY
          echo "- Health: https://$FQDN/healthz" >> $GITHUB_STEP_SUMMARY